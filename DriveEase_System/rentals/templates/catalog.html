{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveEase — Premium Fleet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'rentals/css/style.css' %}">
</head>
<body style="background-color: var(--obsidian); display: block;">

    <!-- ── Navbar ── -->
    <nav class="navbar navbar-expand-lg navbar-premium navbar-dark">
        <div class="container">
            <a class="navbar-brand brand-logo" href="/catalog/">
                <i class="fa-solid fa-car-side me-2"></i>Drive<span>Ease</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <span class="nav-username">
                    <i class="fa-regular fa-circle-user"></i>{{ request.session.username }}
                </span>
                <a href="{% url 'auth_logout' %}" class="btn-signout">Sign Out</a>
            </div>
        </div>
    </nav>

    <!-- ── Content ── -->
    <div class="container my-5">

        <!-- Page Header -->
        <div class="mb-4">
            <h2 class="catalog-title">Our Premium Fleet</h2>
            <p class="catalog-subtitle">Select a category below to filter our luxury vehicles instantly.</p>
        </div>

        <!-- Filter Buttons -->
        <div class="d-flex flex-wrap gap-2 mb-5">
            <button class="btn btn-filter active" data-category="all">All Vehicles</button>
            {% for category in categories %}
                <button class="btn btn-filter" data-category="{{ category.id }}">
                    {{ category.category_name }}
                </button>
            {% endfor %}
        </div>

        <!-- Cars Grid -->
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="cars-container"></div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const container = document.getElementById('cars-container');
            const buttons   = document.querySelectorAll('.btn-filter');

            function setLoading() {
                container.innerHTML = `
                    <div class="col-12 state-loading">
                        <i class="fa-solid fa-spinner spinner-icon"></i>
                        <p>Loading luxury fleet...</p>
                    </div>`;
            }

            function renderCars(cars) {
                if (cars.length === 0) {
                    container.innerHTML = `
                        <div class="col-12 state-empty">
                            <i class="fa-solid fa-car-tunnel empty-icon"></i>
                            <p>No vehicles available in this category.</p>
                        </div>`;
                    return;
                }

                container.innerHTML = cars.map(car => `
                    <div class="col">
                        <div class="car-card h-100">
                            <div class="car-card-body">
                                <span class="car-category-badge">${car.category}</span>
                                <h5 class="car-title">${car.make} ${car.model}</h5>
                                <p class="car-year">Model Year: ${car.year}</p>
                                <div class="car-card-footer">
                                    <div class="car-price">
                                        $${car.rate}<span class="price-unit">/day</span>
                                    </div>
                                    <a href="/booking/setup/${car.id}/" class="btn-book">Book Now</a>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            function fetchCars(categoryId = 'all') {
                setLoading();
                fetch(`/catalog/filter/?category_id=${categoryId}`)
                    .then(r => r.json())
                    .then(data => renderCars(data.cars))
                    .catch(() => {
                        container.innerHTML = `
                            <div class="col-12 state-empty">
                                <i class="fa-solid fa-triangle-exclamation empty-icon"></i>
                                <p>Something went wrong. Please try again.</p>
                            </div>`;
                    });
            }

            fetchCars('all');

            buttons.forEach(btn => {
                btn.addEventListener('click', function () {
                    buttons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    fetchCars(this.dataset.category);
                });
            });
        });
    </script>
</body>
</html>
